<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiger Alert System</title>

  <!-- ✅ Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* 🌿 Full-page background (image or video) */
    body, html {
      height: 100%;
      margin: 0;
      font-family: "Poppins", sans-serif;
      color: #fff;
      overflow: hidden;
    }

  #bg-video {
  position: fixed;
  top: 0; 
  left: 0;
  width: 100%; 
  height: 100%;
  object-fit: cover;
  z-index: -2;
  filter: blur(5px) brightness(55%) contrast(105%);
  transform: scale(1.03);
}

.overlay {
  position: fixed;
  top: 0; 
  left: 0;
  width: 100%; 
  height: 100%;
  background: rgba(0, 0, 0, 0.55);
  z-index: -1;
}



    /* 🌟 Navbar (NAV-A) */
    .navbar {
      background: rgba(0, 0, 0, 0.8);
      border-bottom: 2px solid #d4af37;
    }
    .navbar-brand {
      font-weight: 700;
      color: #d4af37 !important;
      letter-spacing: 1px;
    }

    /* 🐅 Home container */
    .home-container {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 2;
    }

    .home-container img.logo {
      width: 140px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 8px #d4af37);
    }

    .home-container h1.title {
      font-size: 2.8rem;
      font-weight: 700;
      text-shadow: 0 0 10px #000;
      margin-bottom: 30px;
    }

    .btn-custom {
      display: inline-block;
      margin: 10px;
      padding: 14px 32px;
      background: linear-gradient(45deg, #d4af37, #c49b31);
      color: #000;
      border-radius: 40px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
    }

    .btn-custom:hover {
      background: #fff;
      color: #000;
      transform: scale(1.05);
    }

    .small-note {
      font-size: 0.9rem;
      margin-top: 30px;
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .home-container h1.title { font-size: 1.8rem; }
      .btn-custom { padding: 12px 22px; font-size: 0.95rem; }
    }
  </style>
</head>

<body>

  <!-- 🎬 Background (use either video or image) -->
  <!-- Option 1: Video background -->
  <video autoplay muted loop id="bg-video">
    <source src="images/video.mp4" type="video/mp4" />
  </video>

  <!-- Option 2: If you prefer image background, comment out the video tag above and add this:
  <div class="overlay" style="background:url('images/image3.jpg') no-repeat center center/cover;"></div>
  -->

  <!-- 🌟 Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="images/logo.png" alt="Logo" width="45" height="45" class="me-2">
        Tiger Alert System
      </a>
    </div>
  </nav>

  <!-- 🏞️ Home Section -->
  <div class="home-container">
    <h1 class="title">National Park Safety & Monitoring Dashboard</h1>

    <div class="d-flex flex-wrap justify-content-center">
      <a href="add_camera.jsp" class="btn-custom">Add Camera</a>
      <a href="add_alert.jsp" class="btn-custom">Issue Alert</a>
      <a href="view_alerts.jsp" class="btn-custom">View Alerts</a>
    </div>

    <p class="small-note">Empowering Wildlife Protection • Forest Reserve India</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
